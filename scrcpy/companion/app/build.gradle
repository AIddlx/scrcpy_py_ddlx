apply plugin: 'com.android.application'

android {
    namespace 'com.genymobile.scrcpy.companion'
    compileSdk 34

    defaultConfig {
        applicationId "com.genymobile.scrcpy.companion"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No dependencies needed for TileService
}
